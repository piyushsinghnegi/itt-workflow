name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]

jobs:
  deploy:
    runs-on: self-hosted
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        shell: powershell
        run: |
          "DATABASE_URL=${{ secrets.DATABASE_URL }}" | Out-File -FilePath .env -Encoding utf8
          "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" | Out-File -FilePath .env -Encoding utf8 -Append
          "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" | Out-File -FilePath .env -Encoding utf8 -Append

      - name: Deploy with Docker Compose
        shell: powershell
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest
          docker compose down
          docker compose up -d
      
      - name: Notify Teams
        if: always()
        shell: powershell
        run: |
          try {
            Invoke-RestMethod -Uri ${{ secrets.TEAMS_WEBHOOK_URL }} -Method Post -ContentType "application/json" -Body (@{
              "@type" = "MessageCard"
              "@context" = "http://schema.org/extensions"
              "summary" = "Deploy Status"
              "themeColor" = "0076D7"
              "title" = "Deploy Status local runner"
              "text" = "Deploy completed with status: $($env:GITHUB_JOB_STATUS)"
            } | ConvertTo-Json -Compress)
          } catch {
            Write-Host "Teams notification failed"
          }