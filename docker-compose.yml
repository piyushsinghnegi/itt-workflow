services:
  db:
    image: postgres:15
    container_name: postgres_db

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: piyushsinghnegi/fastapi-app:latest
    container_name: fastapi_app

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

volumes:
  postgres_data: