<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>crud app</title>
</head>
<style>
body{
    font-family: Arial;
    background:#f4f4f4;
}
.container{
    width:400px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:8px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input{
    width:90%;
    padding:8px;
    margin:8px 0;
}
button{
    padding:8px 16px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}
a{
    text-decoration:none;
}
</style>
<body>
    <div class="container">
        <h2>Create Item</h2>
        <form method="post">
            <input type="text" name="name" placeholder="Item Name" required>
            <input type="text" name="description" placeholder="Description" required>
            <br><br>
            <button type="submit">Create</button>
        </form>
        <br>
        <a href="/">Back</a>
    </div>
</body>
</html>
